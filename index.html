<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物件告別儀式</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f0f2ff; font-family: -apple-system, sans-serif; }
        .card { background: white; border-radius: 2rem; padding: 2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .input-field { background: #f8f9ff; border: none; border-radius: 1rem; padding: 1rem; width: 100%; margin-top: 0.5rem; outline: none; }
        .btn-next { background: black; color: white; border-radius: 2rem; padding: 1rem; width: 100%; font-weight: bold; margin-top: 2rem; }
        .step { display: none; }
        .step.active { display: block; }
        .preview-img { width: 100%; border-radius: 1rem; margin-top: 1rem; display: none; border: 1px dashed #ccc; }
        label { color: #6b7280; font-size: 0.875rem; font-weight: 500; display: block; margin-top: 1rem; }
    </style>
</head>
<body class="p-6">

    <div id="app" class="max-w-md mx-auto">
        <h2 class="text-center text-2xl font-bold mb-6 text-gray-700" id="pageTitle">基本資料</h2>

        <div id="step1" class="step active card">
            <label>姓名</label>
            <input type="text" id="name" class="input-field" placeholder="您的稱呼">
            <label>年齡</label>
            <input type="number" id="age" class="input-field">
            <label>Email</label>
            <input type="email" id="email" class="input-field">
            <label>職業</label>
            <input type="text" id="job" class="input-field">
            <label>最高學歷</label>
            <select id="education" class="input-field" onchange="toggleOtherEdu()">
                <option value="">請選擇</option>
                <option value="高中職">高中職</option>
                <option value="大學">大學</option>
                <option value="碩士">碩士</option>
                <option value="博士">博士</option>
                <option value="其他">其他</option>
            </select>
            <input type="text" id="otherEdu" class="input-field mt-2" style="display: none;" placeholder="請註明學歷">
            <button onclick="nextStep(2)" class="btn-next">下一步</button>
        </div>

        <div id="step2" class="step card">
            <label>告別物件名稱</label>
            <input type="text" id="objName" class="input-field">
            <label>基本功能和外觀</label>
            <textarea id="objDesc" class="input-field" rows="2"></textarea>
            <label>使用時長</label>
            <input type="text" id="objDuration" class="input-field" placeholder="例如：三年">
            <label>記憶或情感連結</label>
            <textarea id="objLink" class="input-field" rows="2"></textarea>
            <label>猶豫告別的原因</label>
            <textarea id="objHesitate" class="input-field" rows="2"></textarea>
            <label>上傳物件照片</label>
            <input type="file" id="objFile" class="input-field" accept="image/*" onchange="preview(this, 'prev1')">
            <img id="prev1" class="preview-img">
            <button onclick="nextStep(3)" class="btn-next">下一步</button>
        </div>

        <div id="step3" class="step card">
            <p class="font-bold text-purple-600 border-b pb-2">溫柔物件</p>
            <label>物件名稱</label>
            <input type="text" id="kindName" class="input-field">
            <label>選擇原因</label>
            <input type="text" id="kindReason" class="input-field">
            <label>上傳照片</label>
            <input type="file" id="kindFile" class="input-field" accept="image/*" onchange="preview(this, 'prev2')">
            <img id="prev2" class="preview-img">

            <p class="font-bold text-red-600 border-b pb-2 mt-8">嘲諷物件</p>
            <label>物件名稱</label>
            <input type="text" id="mockName" class="input-field">
            <label>選擇原因</label>
            <input type="text" id="mockReason" class="input-field">
            <label>上傳照片</label>
            <input type="file" id="mockFile" class="input-field" accept="image/*" onchange="preview(this, 'prev3')">
            <img id="prev3" class="preview-img">
            
            <button onclick="submitForm()" id="submitBtn" class="btn-next">完成並送出資料</button>
        </div>
    </div>

    <script>
        const IMGBB_API_KEY = 'c771d4d74bbeeac8401c8c2ec77452f0'; 
        const GAS_URL = 'AKfycbxZxKaKJ97PmzC8FJKXGQSehzztxeRl4AfDZgfOPez9O-f0P-QoX6juL3IVB9gcC8k'; 

        function toggleOtherEdu() {
            const edu = document.getElementById('education').value;
            document.getElementById('otherEdu').style.display = (edu === '其他') ? 'block' : 'none';
        }

        function nextStep(step) {
            document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');
            const titles = ["", "基本資料", "告別物件詳細資料", "儀式物件選擇"];
            document.getElementById('pageTitle').innerText = titles[step];
            window.scrollTo(0,0);
        }

        function preview(input, imgId) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => {
                    const img = document.getElementById(imgId);
                    img.src = e.target.result;
                    img.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        }

        async function uploadImage(file) {
            if (!file) return "無圖片";
            let formData = new FormData();
            formData.append("image", file);
            const resp = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: formData });
            const json = await resp.json();
            return json.data.url;
        }

        async function submitForm() {
            const btn = document.getElementById('submitBtn');
            btn.innerText = "上傳中，請稍候...";
            btn.disabled = true;

            const objUrl = await uploadImage(document.getElementById('objFile').files[0]);
            const kindUrl = await uploadImage(document.getElementById('kindFile').files[0]);
            const mockUrl = await uploadImage(document.getElementById('mockFile').files[0]);

            let edu = document.getElementById('education').value;
            if (edu === '其他') edu = "其他：" + document.getElementById('otherEdu').value;

            const payload = {
                name: document.getElementById('name').value,
                age: document.getElementById('age').value,
                email: document.getElementById('email').value,
                job: document.getElementById('job').value,
                education: edu,
                objName: document.getElementById('objName').value,
                objDesc: document.getElementById('objDesc').value,
                objDuration: document.getElementById('objDuration').value,
                objLink: document.getElementById('objLink').value,
                objHesitate: document.getElementById('objHesitate').value,
                objUrl: objUrl,
                kindName: document.getElementById('kindName').value,
                kindReason: document.getElementById('kindReason').value,
                kindUrl: kindUrl,
                mockName: document.getElementById('mockName').value,
                mockReason: document.getElementById('mockReason').value,
                mockUrl: mockUrl
            };

            fetch(GAS_URL, {
                method: "POST",
                mode: 'no-cors',
                body: JSON.stringify(payload)
            }).then(() => {
                alert("送出成功！資料已紀錄於 Excel。");
                location.reload();
            });
        }
    </script>
</body>
</html>
